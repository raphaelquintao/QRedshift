name: release.yml
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build . -t qredshift-cross

      - name: Build binaries and DEBs
        run: |
          docker run -v $(pwd):/qredshift qredshift-cross sh -c "make x86_64 i686 aarch64 armv7l armv5tel mips64el mipsel powerpc64le s390x debs"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/qredshift_*
            build/*.deb
